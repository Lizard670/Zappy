<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="tailwindcss-colors.css">
    <link rel="stylesheet" href="style.css">
    <title>Zappy - Chat</title>
</head>

<body>

    <section class="chat-section">
        <div class="chat-container">
            <!-- Sidebar -->
            <aside class="chat-sidebar">
                <a href="#" class="chat-sidebar-logo">
                    <i class="ri-chat-1-fill"></i>
                </a>
                <ul class="chat-sidebar-menu">
                    <li class="active"><a href="#" data-title="Conversas"><i class="ri-chat-3-line"></i></a></li>
                    <li><a href="#" data-title="Contatos"><i class="ri-group-line"></i></a></li>
                    <li><a href="#" data-title="Documentos"><i class="ri-folder-line"></i></a></li>
                    <li><a href="#" data-title="Configurações"><i class="ri-settings-line"></i></a></li>
                </ul>
                <div class="chat-sidebar-profile">
                    <button type="button" class="chat-sidebar-profile-toggle">
                        <img src="https://images.unsplash.com/photo-1535711811017-e3111ad03665?auto=format&fit=crop&w=500&q=60"
                            alt="">
                    </button>
                    <ul class="chat-sidebar-profile-dropdown">
                        <li><a href="#"><i class="ri-user-line"></i> Perfil</a></li>
                        <li><a href="#"><i class="ri-logout-box-line"></i> Sair</a></li>
                    </ul>
                </div>
            </aside>

            <!-- Main Content Area -->
            <div class="chat-content">
                <!-- Chat Sidebar -->
                <div class="content-sidebar">
                    <div class="content-sidebar-title">Chats</div>
                    <form action="" class="content-sidebar-form">
                        <input type="search" class="content-sidebar-input" placeholder="Pesquisar...">
                        <button type="submit" class="content-sidebar-submit"><i class="ri-search-line"></i></button>
                    </form>
                    <div class="content-messages">
                        <ul class="content-messages-list">
                            <!-- JS fills here -->
                        </ul>
                    </div>
                </div>

                <!-- Chat Windows -->
                <div class="conversation conversation-default active">
                    <i class="ri-bubble-chart-line" style="font-size: 48px; opacity: 0.3;"></i>
                    <p>Selecione um chat e veja a conversa!</p>
                </div>

                <!-- Active chat window -->
                <div id="conversations-wrapper">
                    <!-- JS injects .conversation here -->
                </div>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
            </div>
        </div>
    </section>

    <div id="image-preview-modal" class="image-modal">
        <div class="image-modal-content">
            <div class="image-modal-header">
                <h3>Preview da Imagem</h3>
                <button id="close-preview"><i class="ri-close-line"></i></button>
            </div>
            <div class="image-modal-body">
                <img id="preview-img-tag" src="" alt="Preview">
                <textarea id="caption-input" placeholder="Adicione uma legenda..."></textarea>
            </div>
            <div class="image-modal-footer">
                <button id="send-image-btn" class="btn-primary">Enviar</button>
            </div>
        </div>
    </div>

    <div id="voice-recording-overlay" class="voice-overlay">
        <div class="voice-overlay-content">
            <button id="cancel-recording" class="voice-btn-cancel"><i class="ri-delete-bin-line"></i></button>
            <div class="voice-waveform-container">
                <canvas id="voice-waveform"></canvas>
            </div>
            <div class="voice-timer">00:00</div>
            <button id="stop-send-recording" class="voice-btn-send"><i class="ri-send-plane-2-line"></i></button>
        </div>
    </div>

    <div id="my-profile-drawer" class="drawer">
        <div class="drawer-header">
            <button class="drawer-close"><i class="ri-arrow-left-line"></i></button>
            <h3>Meu Perfil</h3>
        </div>
        <div class="drawer-body">
            <div class="profile-edit-avatar">
                <img id="my-profile-img" src="" alt="">
                <button class="edit-avatar-btn"><i class="ri-camera-line"></i></button>
            </div>
            <div class="profile-field">
                <label>Nome</label>
                <input type="text" id="my-profile-name" placeholder="Seu nome">
            </div>
            <div class="profile-field">
                <label>Nome de usuário</label>
                <input type="text" id="my-profile-username" placeholder="@usuario">
            </div>
            <div class="profile-field">
                <label>Bio</label>
                <textarea id="my-profile-bio" placeholder="Fale um pouco sobre você..."></textarea>
            </div>
            <button id="save-profile-btn" class="btn-primary" style="width: 100%; margin-top: 20px;">Salvar
                Alterações</button>
        </div>
    </div>

    <!-- Contact Profile Drawer -->
    <div id="contact-profile-drawer" class="drawer">
        <div class="drawer-header">
            <button class="drawer-close"><i class="ri-close-line"></i></button>
            <h3>Info. do Contato</h3>
        </div>
        <div class="drawer-body">
            <div class="profile-view-avatar">
                <img id="contact-profile-img" src="" alt="">
            </div>
            <div class="profile-view-info">
                <h2 id="contact-profile-name"></h2>
                <p id="contact-profile-username" class="text-muted"></p>
                <div class="profile-view-status">
                    <span class="status-indicator online"></span>
                    <span id="contact-profile-status">online</span>
                </div>
            </div>
            <hr>
            <div class="profile-view-section">
                <label>Bio</label>
                <p id="contact-profile-bio"></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
