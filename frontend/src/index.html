<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="tailwindcss-colors.css">
    <link rel="stylesheet" href="style.css">
    <title>Zappy - Chat</title>
</head>

<body>

    <section class="chat-section">
        <div class="chat-container">
            <!-- Sidebar -->
            <aside class="chat-sidebar">
                <a href="#" class="chat-sidebar-logo">
                    <i class="ri-chat-1-fill"></i>
                </a>
                <ul class="chat-sidebar-menu">
                    <li class="active"><a href="#" data-title="Conversas"><i class="ri-chat-3-line"></i></a></li>
                    <li><a href="#" data-title="Contatos"><i class="ri-group-line"></i></a></li>
                    <li><a href="#" data-title="Documentos"><i class="ri-folder-line"></i></a></li>
                    <li><a href="#" data-title="Configurações"><i class="ri-settings-line"></i></a></li>
                </ul>
                <div class="chat-sidebar-profile">
                    <button type="button" class="chat-sidebar-profile-toggle">
                        <img src="https://images.unsplash.com/photo-1535711811017-e3111ad03665?auto=format&fit=crop&w=500&q=60"
                            alt="">
                    </button>
                    <ul class="chat-sidebar-profile-dropdown">
                        <li><a href="#"><i class="ri-user-line"></i> Perfil</a></li>
                        <li><a href="#"><i class="ri-logout-box-line"></i> Sair</a></li>
                    </ul>
                </div>
            </aside>

            <!-- Main Content Area -->
            <div class="chat-content">
                <!-- Chat Sidebar -->
                <div class="content-sidebar">
                    <div class="content-sidebar-title">Chats</div>
                    <form action="" class="content-sidebar-form">
                        <input type="search" class="content-sidebar-input" placeholder="Pesquisar...">
                        <button type="submit" class="content-sidebar-submit"><i class="ri-search-line"></i></button>
                    </form>
                    <div class="content-messages">
                        <ul class="content-messages-list">
                            <!-- JS preenche aqui -->
                        </ul>
                    </div>
                </div>

                <!-- Chat Windows -->
                <div class="conversation conversation-default active">
                    <i class="ri-bubble-chart-line" style="font-size: 48px; opacity: 0.3;"></i>
                    <p>Selecione um chat e veja a conversa!</p>
                </div>

                <!-- Active chat window -->
                <div id="conversations-wrapper">
                    <!-- JS injects .conversation here -->
                </div>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>

</html>
